name: Build and Release Windows exe

on:
  push:
    tags:
      - 'v*'          # triggers when you push a tag like v1.0.0

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Configure git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true
        shell: bash

      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2 + MinGW toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git
            base-devel

      - name: Install project dependencies
        run: ./installdeps

      - name: Configure and build (static, vcpkg)
        run: |
          mkdir -p build
          cd build
          cmake .. -DVCPKG_TARGET_TRIPLET=x64-mingw-static -DCMAKE_BUILD_TYPE=Release -G Ninja -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -static"
          ninja

      - name: Locate built exe
        id: locate
        run: |
          EXE_PATH=$(find build -maxdepth 2 -iname "visualboyadvance-m.exe" | head -n1)
          echo "exe_path=$EXE_PATH" >> "$GITHUB_OUTPUT"

      - name: Rename exe to ogv.exe
        id: rename
        run: |
          SRC="${{ steps.locate.outputs.exe_path }}"
          DEST="$(dirname "$SRC")/ogv.exe"
          cp "$SRC" "$DEST"
          echo "exe_path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Check for remaining DLL dependencies
        run: |
          echo "Non-system DLL dependencies of ogv.exe (should be empty for a true static build):"
          ldd "${{ steps.rename.outputs.exe_path }}" | grep -iv "system32\|WINDOWS" || echo "(none found - fully static)"

      - name: Bundle required MinGW runtime DLLs (fallback for non-static libgcc/pthread)
        id: bundle
        run: |
          DEST_DIR="$(dirname "${{ steps.rename.outputs.exe_path }}")"
          for dll in libgcc_s_seh-1.dll libwinpthread-1.dll libstdc++-6.dll; do
            if [ -f "/mingw64/bin/$dll" ]; then
              cp "/mingw64/bin/$dll" "$DEST_DIR/"
              echo "Bundled $dll"
            fi
          done
          echo "gcc_dll=$DEST_DIR/libgcc_s_seh-1.dll" >> "$GITHUB_OUTPUT"
          echo "pthread_dll=$DEST_DIR/libwinpthread-1.dll" >> "$GITHUB_OUTPUT"
          echo "stdcpp_dll=$DEST_DIR/libstdc++-6.dll" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with exe attached
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rename.outputs.exe_path }}
            ${{ steps.bundle.outputs.gcc_dll }}
            ${{ steps.bundle.outputs.pthread_dll }}
            ${{ steps.bundle.outputs.stdcpp_dll }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
